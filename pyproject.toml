[project]
name = "clauderock"
version = "0.1.0"
description = "Anthropic API to AWS Bedrock proxy for Claude Code"
readme = "README.md"
requires-python = ">=3.11"
authors = [
    { name = "Daniel Schmidt" }
]
keywords = ["anthropic", "bedrock", "claude", "proxy", "aws", "clauderock"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "boto3>=1.42.33",
    "fastapi>=0.115.0",
    "tiktoken>=0.12.0",
    "uvicorn>=0.34.0",
]

[project.scripts]
clauderock = "clauderock:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["clauderock"]
